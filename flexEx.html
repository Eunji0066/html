<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>flex 가이드</title>
    <style>
        header
        {
            height: 80px;
            text-align: center;
        }

        section
        {
            width: 1200px;
            margin: 0 auto;
            /* 부모에게 display:flex를 주면 자동으로 정렬된다. */
            /* float:left는 더 이상 필요없다*/
            display: flex;
            /* 저스티파이 콘텐츠-센터는 주측 방향의 정렬을 담당한다. */
            justify-content: center;
            gap: 20px;
        }

        .div
        {
            width: 300px;
            text-align: center;
            border: 1px solid lightgray;
            border-radius: 10px;
            height: 100px;
        }

        .div a{text-decoration: none; color: black;}
        
    </style>
</head>
<body>
    <div class="all">
        <header>
            <h1>김은지의 홈페이지</h1>
        </header>
        <section>
            <div class="div">
                <h3>티몬 홈페이지</h3>
                <a href="#">클릭하세요~</a>
            </div>
            
            <div class="div">
                <h3>티몬 홈페이지</h3>
                <a href="#">클릭하세요~</a>
            </div>

            <div class="div">
                <h3>티몬 홈페이지</h3>
                <a href="#">클릭하세요~</a>
            </div>
        </section>
    </div>
</body>
</html>
